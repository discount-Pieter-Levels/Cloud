name: CI/CD - Docker Build and Smoke Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    name: Build and Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir pytest

      - name: Validate Python imports
        run: |
          python -m py_compile src/predict.py src/train.py
          python -c "from src.predict import app; print('✅ FastAPI app import check passed')"

      - name: Run smoke tests if available
        run: |
          if [ -d tests ]; then pytest tests/; else echo "No tests directory found; skipping."; fi

      - name: Build Docker image
        run: |
          docker build -t mlops-project .

      - name: Run container and verify health endpoint
        run: |
          docker run -d --name mlops-smoke -p 8000:8000 -e PORT=8000 mlops-project
          for i in 1 2 3 4 5; do
            curl --fail http://localhost:8000/health && break || sleep 2;
          done
        shell: bash

      - name: Stop smoke container
        if: always()
        run: |
          docker rm -f mlops-smoke || true
